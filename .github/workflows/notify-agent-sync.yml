name: Notify Agent Sync

on:
  push:
    branches: [main]
    paths: [.github/agents/**]
  release:
    types: [published]

permissions:
  contents: none

jobs:
  notify-downstream:
    # Only runs when DOWNSTREAM_REPOS is configured and non-null; acts as a no-op otherwise.
    if: vars.DOWNSTREAM_REPOS != '' && vars.DOWNSTREAM_REPOS != 'null'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Allow other dispatches to continue if one target fails.
      # DOWNSTREAM_REPOS must be a JSON array of "owner/repo" strings, e.g.
      # ["my-org/.github-private", "my-org/another-repo"]
      # Each entry becomes one parallel matrix job.
      matrix:
        repo: ${{ fromJSON(vars.DOWNSTREAM_REPOS) }}
    steps:
      - name: Dispatch agent-sync event
        env:
          AGENT_SYNC_PAT: ${{ secrets.AGENT_SYNC_PAT }}
          TARGET_REPO: ${{ matrix.repo }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          # Sends "agent-release" on published releases; "agent-sync" on every qualifying push.
          EVENT_TYPE: ${{ github.event_name == 'release' && 'agent-release' || 'agent-sync' }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${AGENT_SYNC_PAT:-}" ] || { echo "AGENT_SYNC_PAT not set" >&2; exit 1; }
          # Values are SHA, github refs, or GitHub-enforced [A-Za-z0-9._-/] names — safe for inline JSON interpolation.
          echo "Dispatching ${EVENT_TYPE} to ${TARGET_REPO}"
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AGENT_SYNC_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d "{\"event_type\":\"${EVENT_TYPE}\",\"client_payload\":{\"source_repo\":\"${SOURCE_REPO}\",\"sha\":\"${SOURCE_SHA}\"}}"
