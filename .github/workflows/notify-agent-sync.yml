name: Notify Agent Sync

on:
  push:
    branches:
      - main
    paths:
      - .github/agents/**

permissions:
  contents: read

jobs:
  notify-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync event to .github-private
        env:
          AGENT_SYNC_PAT: ${{ secrets.AGENT_SYNC_PAT }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${AGENT_SYNC_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Grimblaz-and-Friends/.github-private/dispatches \
            -d @- <<EOF
          {
            "event_type": "agent-sync",
            "client_payload": {
              "source_repo": "Grimblaz/workflow-template",
              "sha": "${SOURCE_SHA}"
            }
          }
          EOF
