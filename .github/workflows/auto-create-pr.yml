name: Auto Create PR

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
      - release/**

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-create-pr:
    if: >-
      startsWith(github.ref_name, 'feature/') ||
      startsWith(github.ref_name, 'fix/') ||
      startsWith(github.ref_name, 'bugfix/') ||
      startsWith(github.ref_name, 'hotfix/')
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${context.ref.replace('refs/heads/', '')}`;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base: 'main',
              per_page: 1
            });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists: #${existing.data[0].number}`);
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const title = `chore: open PR for ${branch}`;
            const body = [
              '## Summary',
              '',
              '- Auto-created PR for branch push',
              `- Source branch: \`${branch}\``,
              '',
              '## Notes',
              '',
              '- Update title/body before requesting final review.',
            ].join('\n');

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base: 'main',
              body,
              draft: true
            });

            core.info(`Created PR #${created.data.number}`);
